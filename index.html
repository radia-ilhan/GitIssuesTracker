<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-box">

        <div class="text-center mb-3">
            <img src="logo.jpg" class="login-logo" alt="" onerror="this.style.display='none'">
        </div>

        <h3 class="text-center login-title">GitHub Issues Tracker</h3>
        <p class="text-center login-subtitle">Sign in to manage your issues</p>

        <div class="mb-3">
            <label class="login-label">Username</label>
            <input type="text" class="form-control login-input" id="username" placeholder="Username">
            <small class="default-hint">Default: admin</small>
        </div>

        <div class="mb-3">
            <label class="login-label">Password</label>
            <input type="password" class="form-control login-input" id="password" placeholder="Password">
            <small class="default-hint">Default: admin123</small>
        </div>

        <button class="btn login-btn w-100 mt-2" onclick="doLogin()">Sign In</button>

        <p class="text-danger mt-2" id="errorMsg" style="display:none;">Wrong username or password!</p>

        <div class="or-divider">
            <span>OR</span>
        </div>

        <div class="demo-box mt-2">
            <p class="demo-title">Demo Credentials</p>
            <p class="demo-info">Username: admin</p>
            <p class="demo-info">Password: admin123</p>
        </div>

    </div>

    <script>
        function doLogin() {

            //input field theke value nibo
            var u = document.getElementById("username").value
            var p = document.getElementById("password").value

            //check korbo username r password thik ache kina
            if (u == "admin" && p == "admin123") {

                //localstorage e rakhi je logged in
                localStorage.setItem("loggedIn", "true")

                //dashboard e pathabo
                window.location.href = "dashboard.html"

            } else {

                document.getElementById("errorMsg").style.display = "block"

            }
        }
    </script>

</body>
</html>
