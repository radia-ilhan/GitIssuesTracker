<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-box">

        <div class="text-center mb-3">
            <h2>🐙</h2>
        </div>

        <h4 class="text-center">GitHub Issues Tracker</h4>
        <p class="text-center text-muted">Sign in to continue</p>

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" id="username" placeholder="Enter your username">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter your password">
        </div>

        <button class="btn btn-success w-100" onclick="doLogin()">Sign In</button>

        <p class="text-danger mt-2" id="errorMsg" style="display:none;">Wrong username or password!</p>

        <div class="demo-box mt-3">
            <small><strong>Demo Credentials:</strong></small><br>
            <small>Username: admin</small><br>
            <small>Password: admin123</small>
        </div>

    </div>

    <script>
        function doLogin() {
            let username = document.getElementById("username").value
            let password = document.getElementById("password").value

            if (username == "admin" && password == "admin123") {
                localStorage.setItem("loggedIn", "true")
                window.location.href = "dashboard.html"
            } else {
                document.getElementById("errorMsg").style.display = "block"
            }
        }
    </script>

</body>
</html>
